  </header>
  <p class="meta">

    <span>來源：blogger</span>

  </p>
  <section class="post-content">
    <p>一看就停不下來了...<br />
因為書中說出了我想說的嗎？不知道。<br />
只知道我也曾經想過這些，抗拒過這些，<br />
但是現在也平淡的融入在這一切之中。<br />
是我已經屈服了嗎？<br />
我相信沒有。我還在等待，<br />
等待一切改變的契機來臨，等待制度與公理的黃金交叉，<br />
屆時我也將奮不顧身。</p>
