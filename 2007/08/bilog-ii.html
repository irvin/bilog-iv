  </p>
  <section class="post-content">
    <p>如果先前有來過 Bilog II 的朋友，大概會發現這裡變得不一樣：Bilog 從綠色系變成紫色系了。計畫很久的改版，正趁暑假的時間進行中嘍！這幾天都會繼續修改，所以有時候可能會發現一些畫面上的錯誤、或是看到畫面上的即時變化啦。</p>

  </section>
