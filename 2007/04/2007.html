<br />
第七屆倪匡科幻獎即將開始收件了，此次科幻小說獎字數限制增加為三千到六千字，有了更充足的空間可以發揮，相信會有更多好看的作品。收件截止日期一樣是 7 月 31 日，大家一起努力吧！</p>
