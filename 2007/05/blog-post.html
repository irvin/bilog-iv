  </header>
  <p class="meta">
    <time datetime="2007-05-20T16:05:00Z">2007年5月21日</time>
    <span>來源：blogger</span>
    <a href="http://irvin.sto.tw/2007/05/blog-post.html" target="_blank" rel="noopener">原文連結</a>
  </p>
  <section class="post-content">
    <p>以下是交大四年的心得：</p>
<p>紀某人萬年不倒爛餐廳油膩雞腿大一點漲十塊<br />
流浪狗叫獸愛囂張逛街躺全家追人汪汪咬學妹<br />
賽車道住機車人靠北總務十點關門好人繞遠路<br />
餐廳門口直銷擺攤食物不營養補丸便宜來一罐</p>
<p>校務系統麻木不仁沒人管事<br />
學生擺旁邊老師鄰居放中間</p>

  </section>
