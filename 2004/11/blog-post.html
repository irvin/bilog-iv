  <section class="post-content">
    <p>實在很佩服<br />
瞇瞇眼的主角帶出來的劇情<br />
沒想到一個比一個精彩<br />
而且不論他呆什麼職位都會有很有趣的發展<br />
雖然是主角魔力在作祟<br />
但是還是很期待他還會發生什麼樣的故事<br />
一本漫畫<br />
一個人生<br />
不但有事業 愛情 溫馨 成長<br />
還能夠有些什麼<br />
<br />
我想這應該是一本全部看完之後<br />
會很失落的漫畫吧</p>
