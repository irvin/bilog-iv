  <section class="post-content">
    <div style="float: right; margin-left: 10px; margin-bottom: 10px;"> <a href="http://www.flickr.com/photos/irvin/2461740204/" title="「兩元冰」"><img src="/assets/images/farm4.static.flickr.com/e267291c667582d1.jpg" alt="" /></a></div>這是去年七月在台南勝利路東寧路口拍的「2元冰」。其實這是騙人的，一靠過去就是一整盒五包共25隻，忘了總共花了多少錢了，有點強迫推銷的意味。冰是很涼味道不錯，但是用這種刻意的欺騙式廣告就是很沒品。<br /><br />夏天到了，也看到這幫兩元集團擺出來啦，翻出去年的照片跟大家分享……<br clear="all" /><div id="fullpost">
